<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Shopping Center</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&family=Noto+Sans+Arabic:wght@300;400;500&display=swap"
    rel="stylesheet"
  >
  <script>
    // Apply saved theme + language before first paint to avoid a flash.
    (function () {
      try {
        var theme = localStorage.getItem('sc_theme');
        if (!theme) {
          theme = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        var lang = localStorage.getItem('sc_lang') === 'ar' ? 'ar' : 'en';
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
